# DRY-RUN of create_spec.yml — exercises the full plumbing (branch, real
# claude-code-action call, commit, artifact, PR) WITHOUT the ~1.5h create-spec
# pipeline. The Claude step just writes pr_body.md + a placeholder spec so we
# can confirm: auth works, the `execution_file` output exists, the branch/commit/
# artifact/PR wiring works, and the PR is authored by github-actions[bot].
#
# Required secret: CLAUDE_CODE_OAUTH_TOKEN  (subscription auth; generate locally
#   with `claude setup-token` on a Pro/Max account, then store as a repo secret).
#   Also enable "Allow GitHub Actions to create and approve pull requests"
#   (Settings -> Actions -> General -> Workflow permissions).
# Manual trigger: Actions tab -> "Create Spec (dry-run)" -> Run workflow.
# Clean up the throwaway branch + PR it creates after the test.
name: "Create Spec (dry-run)"

on:
  workflow_dispatch:
    inputs:
      chain_name:
        description: "Human-readable chain name (e.g. Iota)"
        required: true
        type: string
      chain_mainnet_index:
        description: "Uppercase mainnet spec index (e.g. IOTA)"
        required: true
        type: string
      chain_testnet_index:
        description: "Uppercase testnet spec index (e.g. IOTAT)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: create-spec-dryrun
  cancel-in-progress: false

jobs:
  create_spec_dryrun:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Compute branch name
        id: branch
        env:
          CHAIN_NAME: ${{ github.event.inputs.chain_name }}
        run: |
          chain_lower="$(printf '%s' "$CHAIN_NAME" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9-')"
          if [ -z "$chain_lower" ]; then
            echo "chain_name '$CHAIN_NAME' sanitizes to an empty branch slug" >&2
            exit 1
          fi
          base="${chain_lower}-spec-dryrun"
          name="$base"
          if git ls-remote --exit-code --heads origin "$base" >/dev/null 2>&1; then
            name="${base}-$(date +%d-%m-%Y)"
          fi
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "chain_lower=$chain_lower" >> "$GITHUB_OUTPUT"
          git checkout -b "$name"
          git push -u origin "$name"

      - name: Run claude (dry-run prompt)
        id: run
        uses: anthropics/claude-code-action@v1
        with:
          # Subscription auth (Pro/Max) instead of an API key.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Skip the OIDC->Claude-App exchange (no GitHub App install needed).
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: |
            --model haiku
            --dangerously-skip-permissions
            --max-turns 10
          prompt: |
            You are running in a CI smoke test. Do exactly these two things, then stop. Do NOT run any git commands.

            1. Write a file named `pr_body.md` at the repository root containing this markdown:

            ## Dry-run smoke test: ${{ github.event.inputs.chain_name }}

            This PR was generated by the create_spec **dry-run** workflow to verify the GitHub Action plumbing (branch, commit, artifact, PR) and the claude-code-action integration. No real spec was generated.

            - Mainnet index: ${{ github.event.inputs.chain_mainnet_index }}
            - Testnet index: ${{ github.event.inputs.chain_testnet_index }}

            2. Write a placeholder spec file at `specs/testnet-2/specs/${{ steps.branch.outputs.chain_lower }}.json` whose entire contents are exactly:

            {"dryrun": true}

      - name: Verify dry-run outputs
        run: |
          chain_lower="${{ steps.branch.outputs.chain_lower }}"
          spec="specs/testnet-2/specs/${chain_lower}.json"
          if [ ! -f "$spec" ]; then
            echo "Placeholder spec $spec was not produced by the dry-run prompt" >&2
            exit 1
          fi
          if [ ! -f pr_body.md ]; then
            echo "pr_body.md was not produced by the dry-run prompt" >&2
            exit 1
          fi
          echo "execution_file output: '${{ steps.run.outputs.execution_file }}'"

      - name: Commit and push placeholder spec
        env:
          CHAIN_NAME: ${{ github.event.inputs.chain_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add specs/testnet-2/specs/
          git commit -m "test(ci): dry-run placeholder spec for ${CHAIN_NAME}"
          git push origin "${{ steps.branch.outputs.name }}"

      - name: Upload transcript artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: create-spec-dryrun-transcript
          path: |
            ${{ steps.run.outputs.execution_file }}
            pr_body.md
          if-no-files-found: warn

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CHAIN: ${{ github.event.inputs.chain_name }}
        run: |
          branch="${{ steps.branch.outputs.name }}"
          chain="$CHAIN"

          if [ ! -f pr_body.md ]; then
            printf '## Dry-run: %s\n\n_pr_body.md was not produced; see run logs._\n' "$chain" > pr_body.md
          fi

          {
            printf '\n\n---\n'
            printf '🤖 DRY-RUN of `create_spec.yml` · [workflow run](%s) · transcript in run artifacts\n' "$RUN_URL"
          } >> pr_body.md

          gh pr create \
            --base main \
            --head "$branch" \
            --title "test(dry-run): create_spec plumbing for ${chain}" \
            --body-file pr_body.md

# Dry-run harness for the Jira <-> GitHub round trip used by create_spec.yml.
# It does NOT run create-spec — it only parses the dispatch payload and reports
# back to the Jira ticket, so you can verify the wiring (PAT, repository_dispatch,
# the Jira "Send web request" rule, and the GitHub -> Jira callback secrets) in
# seconds instead of waiting ~1.5h for a real run.
#
# Trigger it the same way as the real one, but point a TEST Jira automation rule
# at event_type "create-spec-dryrun" (not "create-spec"). Or fire it by hand:
#   curl -sS -X POST \
#     -H "Authorization: Bearer <FINE_GRAINED_PAT>" \
#     -H "Accept: application/vnd.github+json" \
#     https://api.github.com/repos/lavanet/lava/dispatches \
#     -d '{"event_type":"create-spec-dryrun","client_payload":{"title":"[create-spec] Iota / IOTA / IOTAT","description":"hello","issue_key":"LAVA-1"}}'
#
# Like the real workflow, repository_dispatch only fires for the copy of this
# file on the DEFAULT branch (main).
name: "Create Spec (dry run)"

on:
  repository_dispatch:
    types: [create-spec-dryrun]
  workflow_dispatch:
    inputs:
      chain_name:
        description: "Human-readable chain name (e.g. Iota)"
        required: true
        type: string
      chain_mainnet_index:
        description: "Uppercase mainnet spec index (e.g. IOTA)"
        required: true
        type: string
      chain_testnet_index:
        description: "Uppercase testnet spec index (e.g. IOTAT)"
        required: true
        type: string
      additional_data:
        description: "Free text (echoed back, not used)"
        required: false
        type: string
        default: ""
      issue_key:
        description: "Optional Jira issue key to comment on (e.g. LAVA-1). Leave empty to skip the Jira callback."
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  dryrun:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      # Same resolver the real workflow uses, so parsing behaviour is identical.
      - name: Resolve inputs
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          WD_CHAIN_NAME: ${{ github.event.inputs.chain_name }}
          WD_MAINNET: ${{ github.event.inputs.chain_mainnet_index }}
          WD_TESTNET: ${{ github.event.inputs.chain_testnet_index }}
          WD_ADDITIONAL: ${{ github.event.inputs.additional_data }}
          RD_TITLE: ${{ github.event.client_payload.title }}
          RD_DESCRIPTION: ${{ github.event.client_payload.description }}
          RD_ISSUE_KEY: ${{ github.event.client_payload.issue_key }}
        run: bash .github/scripts/resolve_create_spec_inputs.sh

      - name: Echo parsed inputs to the run summary
        env:
          CHAIN_NAME: ${{ steps.resolve.outputs.chain_name }}
          MAINNET: ${{ steps.resolve.outputs.chain_mainnet_index }}
          TESTNET: ${{ steps.resolve.outputs.chain_testnet_index }}
          ADDITIONAL: ${{ steps.resolve.outputs.additional_data }}
          ISSUE_KEY: ${{ steps.resolve.outputs.issue_key }}
        run: |
          {
            echo "### Dry-run parsed payload"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| event | ${{ github.event_name }} |"
            echo "| chain_name | $CHAIN_NAME |"
            echo "| mainnet_index | $MAINNET |"
            echo "| testnet_index | $TESTNET |"
            echo "| issue_key | $ISSUE_KEY |"
            echo "| additional_data | $ADDITIONAL |"
          } >> "$GITHUB_STEP_SUMMARY"

      # GitHub -> Jira callback. Posts a comment echoing what GitHub parsed, then
      # adds a label, so BOTH directions of the round trip are proven. Uses the
      # manual issue_key input as a fallback so a manual workflow_dispatch can
      # also exercise the callback. Each Jira call is non-fatal.
      - name: Report to Jira
        if: ${{ always() && (steps.resolve.outputs.issue_key != '' || github.event.inputs.issue_key != '') }}
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          ISSUE_KEY: ${{ steps.resolve.outputs.issue_key || github.event.inputs.issue_key }}
          JOB_STATUS: ${{ job.status }}
          CHAIN_NAME: ${{ steps.resolve.outputs.chain_name }}
          MAINNET: ${{ steps.resolve.outputs.chain_mainnet_index }}
          TESTNET: ${{ steps.resolve.outputs.chain_testnet_index }}
          ADDITIONAL: ${{ steps.resolve.outputs.additional_data }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          # Same destination status the real workflow moves the ticket to.
          TARGET_STATUS: "PR REVIEW"
        run: |
          set -euo pipefail
          api="$JIRA_BASE_URL/rest/api/3"
          base="$api/issue/$ISSUE_KEY"

          # --- Preflight: diagnose auth / base-URL / visibility BEFORE writes ---
          # Prints HTTP status codes so a misconfig is obvious in the log instead
          # of a bare "curl 404". Non-fatal — we still attempt the writes after.
          echo "::group::Jira preflight"
          me_code="$(curl -s -o /dev/null -w '%{http_code}' \
            -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" "$api/myself" || echo 000)"
          issue_code="$(curl -s -o /dev/null -w '%{http_code}' \
            -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" "$base" || echo 000)"
          echo "GET /myself           -> $me_code"
          echo "GET /issue/$ISSUE_KEY -> $issue_code"
          if [ "$me_code" != "200" ]; then
            echo "::warning::Jira auth failed (GET /myself -> $me_code). Check JIRA_USER_EMAIL/JIRA_API_TOKEN. A SCOPED token only works via the api.atlassian.com/ex/jira/{cloudId} gateway — set JIRA_BASE_URL to that; a 401 means bad credentials."
          elif [ "$issue_code" != "200" ]; then
            echo "::warning::Auth OK but $ISSUE_KEY not visible (GET issue -> $issue_code). The account likely lacks Browse Projects on that project, or JIRA_BASE_URL points at the wrong site."
          else
            echo "Preflight OK: credentials valid and $ISSUE_KEY is visible."
          fi
          echo "::endgroup::"

          if [ "$JOB_STATUS" = "success" ]; then
            label="spec-dryrun-ok"
            verdict="✅ parsed OK"
          else
            label="spec-dryrun-failed"
            verdict="❌ parse/job failed — check the run"
          fi

          comment="$(printf '%s\n' \
            "🔁 create-spec DRY RUN — Jira ↔ GitHub round trip $verdict" \
            "" \
            "GitHub received this dispatch and parsed:" \
            "- chain_name: ${CHAIN_NAME:-<none>}" \
            "- mainnet_index: ${MAINNET:-<none>}" \
            "- testnet_index: ${TESTNET:-<none>}" \
            "- additional_data: ${ADDITIONAL:-<none>}" \
            "" \
            "No spec was generated (dry run). Run: $RUN_URL")"

          # Comment (v2 API takes a plain-text body). jq builds the JSON safely.
          jq -n --arg b "$comment" '{body: $b}' \
            | curl -sS -f -X POST \
                -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
                -H "Content-Type: application/json" \
                "$JIRA_BASE_URL/rest/api/2/issue/$ISSUE_KEY/comment" \
                --data @- \
            || echo "::warning::Jira comment on $ISSUE_KEY failed (non-fatal)."

          # Label, same call shape as the real workflow's callback.
          curl -sS -f -X PUT \
            -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
            -H "Content-Type: application/json" \
            "$base" \
            --data "{\"update\":{\"labels\":[{\"add\":\"$label\"}]}}" \
            || echo "::warning::Jira labelling of $ISSUE_KEY failed (non-fatal)."

          # Transition to PR REVIEW on success — mirrors the real callback so the
          # dry run also exercises the transition API. Looked up by status name.
          if [ "$JOB_STATUS" = "success" ]; then
            tid="$(curl -sS -f \
                    -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
                    -H "Accept: application/json" \
                    "$base/transitions" 2>/dev/null \
                  | jq -r --arg t "$TARGET_STATUS" \
                      '.transitions[] | select((.to.name|ascii_upcase)==($t|ascii_upcase)) | .id' \
                  | head -n1 || true)"
            if [ -n "$tid" ]; then
              echo "Transitioning $ISSUE_KEY to '$TARGET_STATUS' (id $tid)"
              curl -sS -f -X POST \
                -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
                -H "Content-Type: application/json" \
                "$base/transitions" \
                --data "{\"transition\":{\"id\":\"$tid\"}}" \
                || echo "::warning::Jira transition of $ISSUE_KEY to '$TARGET_STATUS' failed (non-fatal)."
            else
              echo "::warning::No available transition to '$TARGET_STATUS' from $ISSUE_KEY (non-fatal)."
            fi
          fi

# PHASE-8 SMOKE for create_spec.yml — does NOT run the create-spec skill.
# Instead it reproduces what create-spec Phase 8 does on the runner: build the
# binaries, bootstrap a local lava node, stake a provider, boot provider+consumer
# screens for an EXISTING in-repo spec, then probe the consumer. Purpose: flush
# out boot-time dependency / environment gaps cheaply (~15-25 min) before paying
# for a full ~1h30m opus create-spec run.
#
# No Claude/auth secrets needed. Defaults boot ETH1 against a public RPC.
# Manual trigger: Actions tab -> "Create Spec (Phase 8 smoke)" -> Run workflow.
name: "Create Spec (Phase 8 smoke)"

on:
  workflow_dispatch:
    inputs:
      spec_file:
        description: "Extra spec file(s) CSV to add (existing in-repo spec)"
        required: false
        type: string
        default: "specs/mainnet-1/specs/ethereum.json"
      chain_id:
        description: "Chain id to stake/boot"
        required: false
        type: string
        default: "ETH1"
      api_interface:
        description: "API interface (jsonrpc/rest/tendermintrpc/grpc)"
        required: false
        type: string
        default: "jsonrpc"
      node_url:
        description: "Upstream RPC URL the provider proxies to"
        required: false
        type: string
        default: "https://ethereum-rpc.publicnode.com"
      probe_body:
        description: "JSON body to POST to the consumer (127.0.0.1:3360)"
        required: false
        type: string
        default: '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}'

permissions:
  contents: read

concurrency:
  group: create-spec-phase8-smoke
  cancel-in-progress: false

jobs:
  phase8_smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.3"

      # Same prep as the real workflow: the boot script runs `make install-all`
      # and drives everything inside `screen`; ensure its tools + PATH are ready.
      - name: Prepare boot environment
        run: |
          sudo apt-get update
          sudo apt-get install -y screen psmisc jq
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Write provider config
        env:
          CHAIN_ID: ${{ github.event.inputs.chain_id }}
          API_INTERFACE: ${{ github.event.inputs.api_interface }}
          NODE_URL: ${{ github.event.inputs.node_url }}
        run: |
          cat > config/smoke_provider.yml <<EOF
          endpoints:
            - api-interface: ${API_INTERFACE}
              chain-id: ${CHAIN_ID}
              network-address:
                address: 127.0.0.1:2220
              node-urls:
                - url: ${NODE_URL}
          EOF
          echo "--- provider config ---"
          cat config/smoke_provider.yml

      # Reproduces create-spec Phase 8. The script itself runs `make install-all`,
      # starts a node, passes spec-add + plans-add gov proposals, stakes a
      # provider, and launches provider1 + consumers screens.
      - name: Boot Phase 8 (build + node + provider + consumer)
        env:
          SPEC_FILE: ${{ github.event.inputs.spec_file }}
          CHAIN_ID: ${{ github.event.inputs.chain_id }}
          API_INTERFACE: ${{ github.event.inputs.api_interface }}
        run: |
          ./scripts/pre_setups/init_chain_only_with_node.sh \
            "$SPEC_FILE" "$CHAIN_ID" "$API_INTERFACE" config/smoke_provider.yml

      - name: Verify node and screens are up
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          echo "--- screens ---"
          screen -ls || true
          for s in node provider1 consumers; do
            if ! screen -ls | grep -q "\.${s}\b"; then
              echo "FAIL: expected screen session '$s' is not running" >&2
              exit 1
            fi
          done
          height="$(lavad status 2>/dev/null | jq -r '.SyncInfo.latest_block_height // .sync_info.latest_block_height // empty')"
          echo "lava node height: '$height'"
          if [ -z "$height" ] || [ "$height" -lt 1 ] 2>/dev/null; then
            echo "FAIL: lava node did not reach a block height" >&2
            exit 1
          fi

      # Probe via the local consumer (NOT the upstream node). Best-effort: pairing
      # can take an epoch to propagate, so retry. A failure here is reported but
      # does not fail the job — the boot/build/env checks above are the hard gate.
      - name: Probe consumer (best-effort relay)
        env:
          PROBE_BODY: ${{ github.event.inputs.probe_body }}
        run: |
          ok=0
          for i in $(seq 1 30); do
            resp="$(curl -s -m 8 -X POST http://127.0.0.1:3360 \
              -H 'Content-Type: application/json' --data "$PROBE_BODY" || true)"
            echo "attempt $i: $resp"
            if echo "$resp" | jq -e '.result != null' >/dev/null 2>&1; then
              ok=1; echo "consumer relay OK"; break
            fi
            sleep 10
          done
          if [ "$ok" -ne 1 ]; then
            echo "::warning::consumer relay did not return a result (pairing delay or upstream RPC issue); boot machinery still validated"
          fi

      - name: Upload boot logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase8-smoke-logs
          path: |
            testutil/debugging/logs/*.log
          if-no-files-found: warn
